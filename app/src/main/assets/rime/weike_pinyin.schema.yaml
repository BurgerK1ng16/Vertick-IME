# SPDX-License-Identifier: GPL-3.0-or-later
schema:
  schema_id: weike_pinyin
  name: 维刻拼音
  version: '2026.07.07'

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]

engine:
  processors:
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - abc_segmentor
    - fallback_segmentor
  translators:
    - script_translator
  filters:
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/
    - derive/^([nl])ue$/$1ve/
    - derive/^([jqxy])u$/$1v/
    - derive/un$/uen/
    - derive/ui$/uei/
    - derive/iu$/iou/
    - derive/([aeiou])ng$/$1gn/

translator:
  dictionary: weike_pinyin
  enable_sentence: true
  enable_encoder: true
  max_phrase_length: 8
  enable_completion: true
  enable_user_dict: true
  initial_quality: 1.2
