schema:
  schema_id: weike_t9
  name: 维刻九宫格拼音
  version: '2026.07.16'

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]

engine:
  processors:
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - abc_segmentor
    - fallback_segmentor
  translators:
    - script_translator
  filters:
    - uniquifier

speller:
  alphabet: 23456789
  delimiter: " '"
  algebra:
    - xform/[abc]/2/
    - xform/[def]/3/
    - xform/[ghi]/4/
    - xform/[jkl]/5/
    - xform/[mno]/6/
    - xform/[pqrs]/7/
    - xform/[tuv]/8/
    - xform/[wxyz]/9/

translator:
  dictionary: weike_pinyin
  enable_sentence: true
  enable_encoder: true
  max_phrase_length: 8
  enable_completion: true
  enable_user_dict: true
  initial_quality: 1.2
